<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1620" font-family="Arial, Helvetica, sans-serif" font-size="14">
  <!-- Title -->
  <text x="590" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E79">MAHA Mortality Tracker — Research Protocol Workflow v1.0</text>
  <text x="590" y="58" text-anchor="middle" font-size="13" fill="#595959">Daily / Weekly / Monthly / Triggered surveillance → Capture → Triage → Tier → Assessment</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#595959"/>
    </marker>
  </defs>

  <!-- 1. Source Surveillance -->
  <rect x="390" y="90" width="400" height="70" rx="8" ry="8" fill="#DAE3F3" stroke="#1F4E79" stroke-width="2"/>
  <text x="590" y="120" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Source Surveillance per Cadence</text>
  <text x="590" y="142" text-anchor="middle" font-size="12" fill="#1F4E79">Daily news scan · Weekly synthesis · Monthly comprehensive · Triggered runs</text>
  <line x1="590" y1="160" x2="590" y2="200" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. Decision: Candidate? -->
  <polygon points="590,205 760,265 590,325 420,265" fill="#FFF2CC" stroke="#BF8F00" stroke-width="2"/>
  <text x="590" y="260" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Candidate Action</text>
  <text x="590" y="278" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Identified?</text>
  <!-- No: loop back -->
  <text x="395" y="262" text-anchor="end" font-size="12" fill="#595959">No</text>
  <path d="M 420 265 Q 250 265 250 125 Q 250 90 388 90" fill="none" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Yes: down -->
  <text x="600" y="345" text-anchor="start" font-size="12" fill="#595959">Yes</text>
  <line x1="590" y1="325" x2="590" y2="365" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. Verify URL -->
  <rect x="420" y="370" width="340" height="60" rx="8" ry="8" fill="#DAE3F3" stroke="#1F4E79" stroke-width="2"/>
  <text x="590" y="397" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Verify Source URL Resolves</text>
  <text x="590" y="415" text-anchor="middle" font-size="12" fill="#595959">No URLs from memory · Verify at capture · Re-verify monthly</text>
  <line x1="590" y1="430" x2="590" y2="465" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Capture in Registry -->
  <rect x="420" y="470" width="340" height="60" rx="8" ry="8" fill="#DAE3F3" stroke="#1F4E79" stroke-width="2"/>
  <text x="590" y="497" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Capture in Kennedy Action Registry</text>
  <text x="590" y="515" text-anchor="middle" font-size="12" fill="#595959">Status: Candidate · Required fields populated</text>
  <line x1="590" y1="530" x2="590" y2="565" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Categorize -->
  <rect x="420" y="570" width="340" height="60" rx="8" ry="8" fill="#DAE3F3" stroke="#1F4E79" stroke-width="2"/>
  <text x="590" y="597" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Categorize Action</text>
  <text x="590" y="615" text-anchor="middle" font-size="12" fill="#595959">Type · Actor · Mechanism · Source Authority Tier</text>
  <line x1="590" y1="630" x2="590" y2="670" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. Decision: Mortality Pathway? -->
  <polygon points="590,675 770,735 590,795 410,735" fill="#FFF2CC" stroke="#BF8F00" stroke-width="2"/>
  <text x="590" y="730" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Plausible Mortality</text>
  <text x="590" y="748" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Pathway?</text>
  <!-- No → off-ramp right -->
  <text x="780" y="730" text-anchor="start" font-size="12" fill="#595959">No</text>
  <line x1="770" y1="735" x2="850" y2="735" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="855" y="700" width="290" height="70" rx="8" ry="8" fill="#F2F2F2" stroke="#595959" stroke-width="2"/>
  <text x="1000" y="725" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Status: Logged —</text>
  <text x="1000" y="743" text-anchor="middle" font-weight="bold" fill="#1F1F1F">No Mortality Pathway</text>
  <text x="1000" y="761" text-anchor="middle" font-size="11" fill="#595959">(Kept in Registry for context)</text>
  <!-- Yes → down -->
  <text x="600" y="813" text-anchor="start" font-size="12" fill="#595959">Yes</text>
  <line x1="590" y1="795" x2="590" y2="830" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7. Decision: Population? -->
  <polygon points="590,835 770,895 590,955 410,895" fill="#FFF2CC" stroke="#BF8F00" stroke-width="2"/>
  <text x="590" y="890" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Affected Population</text>
  <text x="590" y="908" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Definable?</text>
  <!-- No → off-ramp right -->
  <text x="780" y="890" text-anchor="start" font-size="12" fill="#595959">No</text>
  <line x1="770" y1="895" x2="850" y2="895" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="855" y="860" width="290" height="70" rx="8" ry="8" fill="#F2F2F2" stroke="#595959" stroke-width="2"/>
  <text x="1000" y="885" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Status: Hold —</text>
  <text x="1000" y="903" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Population Research</text>
  <text x="1000" y="921" text-anchor="middle" font-size="11" fill="#595959">(Reviewed monthly)</text>
  <!-- Yes → down -->
  <text x="600" y="973" text-anchor="start" font-size="12" fill="#595959">Yes</text>
  <line x1="590" y1="955" x2="590" y2="990" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8. Decision: Data? -->
  <polygon points="590,995 770,1055 590,1115 410,1055" fill="#FFF2CC" stroke="#BF8F00" stroke-width="2"/>
  <text x="590" y="1050" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Mortality Data or</text>
  <text x="590" y="1068" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Model Basis?</text>
  <!-- No → off-ramp right -->
  <text x="780" y="1050" text-anchor="start" font-size="12" fill="#595959">No</text>
  <line x1="770" y1="1055" x2="850" y2="1055" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="855" y="1020" width="290" height="70" rx="8" ry="8" fill="#F2F2F2" stroke="#595959" stroke-width="2"/>
  <text x="1000" y="1045" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Status: Hold —</text>
  <text x="1000" y="1063" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Data Research</text>
  <text x="1000" y="1081" text-anchor="middle" font-size="11" fill="#595959">(Reviewed monthly)</text>
  <!-- Yes → down -->
  <text x="600" y="1133" text-anchor="start" font-size="12" fill="#595959">Yes</text>
  <line x1="590" y1="1115" x2="590" y2="1150" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 9. Assign Tier -->
  <rect x="420" y="1155" width="340" height="60" rx="8" ry="8" fill="#E2EFDA" stroke="#385723" stroke-width="2"/>
  <text x="590" y="1182" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Assign Tier Candidate</text>
  <text x="590" y="1200" text-anchor="middle" font-size="12" fill="#385723">Tier 1: Documented chain · Tier 2: Statistical · Tier 3: Projected</text>
  <line x1="590" y1="1215" x2="590" y2="1250" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 10. Queued -->
  <rect x="420" y="1255" width="340" height="60" rx="8" ry="8" fill="#E2EFDA" stroke="#385723" stroke-width="2"/>
  <text x="590" y="1282" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Status: Queued for Assessment</text>
  <text x="590" y="1300" text-anchor="middle" font-size="12" fill="#385723">All five eligibility gates passed</text>
  <line x1="590" y1="1315" x2="590" y2="1350" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 11. Pass to Assessment Protocol -->
  <rect x="420" y="1355" width="340" height="60" rx="8" ry="8" fill="#E2EFDA" stroke="#385723" stroke-width="2"/>
  <text x="590" y="1382" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Pass to Mortality Assessment Protocol</text>
  <text x="590" y="1400" text-anchor="middle" font-size="12" fill="#385723">Methodology · Counterfactual · Confidence Interval · Peer Review</text>
  <line x1="590" y1="1415" x2="590" y2="1450" stroke="#595959" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 12. Notion + GitHub snapshot -->
  <rect x="390" y="1455" width="400" height="70" rx="8" ry="8" fill="#DAE3F3" stroke="#1F4E79" stroke-width="2"/>
  <text x="590" y="1485" text-anchor="middle" font-weight="bold" fill="#1F1F1F">Notion Update + Monthly Snapshot to GitHub</text>
  <text x="590" y="1507" text-anchor="middle" font-size="12" fill="#1F4E79">Registry exported as CSV/JSON · Tagged commit · Version preserved</text>

  <!-- Legend -->
  <rect x="40" y="1540" width="320" height="65" rx="6" ry="6" fill="#FFFFFF" stroke="#BFBFBF" stroke-width="1"/>
  <text x="55" y="1560" font-weight="bold" font-size="12" fill="#1F1F1F">Legend</text>
  <rect x="55" y="1568" width="14" height="10" fill="#DAE3F3" stroke="#1F4E79"/>
  <text x="76" y="1577" font-size="11" fill="#1F1F1F">Process step</text>
  <polygon points="170,1568 184,1573 170,1578 156,1573" fill="#FFF2CC" stroke="#BF8F00"/>
  <text x="190" y="1577" font-size="11" fill="#1F1F1F">Decision gate</text>
  <rect x="55" y="1586" width="14" height="10" fill="#F2F2F2" stroke="#595959"/>
  <text x="76" y="1595" font-size="11" fill="#1F1F1F">Off-ramp (held / no pathway)</text>
  <rect x="220" y="1586" width="14" height="10" fill="#E2EFDA" stroke="#385723"/>
  <text x="241" y="1595" font-size="11" fill="#1F1F1F">Pass to assessment</text>

  <!-- Footer -->
  <text x="590" y="1595" text-anchor="middle" font-size="11" fill="#595959">v1.0 DRAFT · 2026-04-26 · See Research_Protocol_v1.0.md §5 for full workflow definition</text>
</svg>
